<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt 优化系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FAFAF9;
            --surface: #FFFFFF;
            --border: #E8E6E3;
            --border-focus: #C5C2BD;
            --text-primary: #1A1917;
            --text-secondary: #6B6966;
            --text-tertiary: #9C9A97;
            --accent: #2C2C2B;
            --accent-hover: #3D3D3B;
            --success: #3A7D44;
            --error: #B34040;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 24px 96px;
        }

        /* Header */
        .page-header {
            margin-bottom: 48px;
        }

        .page-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .page-header .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .page-header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }

        .card + .card {
            margin-top: 24px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            margin-bottom: 24px;
        }

        .card-title i {
            width: 16px;
            height: 16px;
        }

        /* Form Fields */
        .field {
            margin-bottom: 24px;
        }

        .field:last-of-type {
            margin-bottom: 0;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .field-label .optional {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-tertiary);
        }

        .field-label i {
            width: 14px;
            height: 14px;
            color: var(--text-tertiary);
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(44, 44, 43, 0.06);
        }

        textarea::placeholder, input[type="text"]::placeholder {
            color: var(--text-tertiary);
        }

        textarea {
            min-height: 100px;
        }

        .field-textarea-lg textarea {
            min-height: 140px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Submit Button */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: #FFFFFF;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            transform: scale(0.985);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary i {
            width: 16px;
            height: 16px;
        }

        /* Log Panel */
        .log-panel {
            display: none;
        }

        .log-panel.visible {
            display: block;
        }

        .log-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .log-list::-webkit-scrollbar {
            width: 4px;
        }

        .log-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            animation: fadeSlideIn 300ms ease-out;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-item .log-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            margin-top: 1px;
            color: var(--text-tertiary);
        }

        .log-item.log-done {
            color: var(--success);
        }

        .log-item.log-done .log-icon {
            color: var(--success);
        }

        .log-item.log-error {
            color: var(--error);
        }

        .log-item.log-error .log-icon {
            color: var(--error);
        }

        .log-item .log-text {
            flex: 1;
            line-height: 1.5;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 40px 16px 72px;
            }

            .card {
                padding: 24px 20px;
            }

            .page-header {
                margin-bottom: 32px;
            }

            .page-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <header class="page-header">
        <div class="brand">
            <div class="brand-icon">
                <i data-lucide="sparkles" style="width:18px;height:18px;"></i>
            </div>
            <h1>Prompt 优化系统</h1>
        </div>
        <p class="subtitle">基于遗传算法的智能 Prompt 迭代与评估</p>
    </header>

    <!-- Form Card -->
    <form id="optimizer-form" class="card">
        {% csrf_token %}
        <div class="card-title">
            <i data-lucide="file-text"></i>
            任务配置
        </div>

        <div class="field">
            <label class="field-label">
                <i data-lucide="target"></i>
                需求描述
            </label>
            <textarea name="requirement" rows="4" placeholder="请描述您希望优化的目标和需求…" required></textarea>
        </div>

        <div class="field field-textarea-lg">
            <label class="field-label">
                <i data-lucide="align-left"></i>
                文本内容
            </label>
            <textarea name="text" rows="6" placeholder="请输入需要处理的文本内容…" required></textarea>
        </div>

        <div class="divider"></div>

        <div class="field">
            <label class="field-label">
                <i data-lucide="type"></i>
                文本标题
                <span class="optional">选填</span>
            </label>
            <input type="text" name="title" placeholder="为文本添加标题">
        </div>

        <div class="field">
            <label class="field-label">
                <i data-lucide="user"></i>
                作者
                <span class="optional">选填</span>
            </label>
            <input type="text" name="author" placeholder="输入作者名称">
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-primary" id="submit-btn">
            <i data-lucide="play"></i>
            <span id="btn-text">开始优化</span>
        </button>
    </form>

    <!-- Log Panel -->
    <div class="log-panel card" id="log-panel">
        <div class="card-title">
            <i data-lucide="terminal"></i>
            运行日志
        </div>
        <ul class="log-list" id="log"></ul>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    lucide.createIcons();
});

document.getElementById("optimizer-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const log = document.getElementById("log");
    const logPanel = document.getElementById("log-panel");
    const submitBtn = document.getElementById("submit-btn");
    const btnText = document.getElementById("btn-text");

    log.innerHTML = "";
    logPanel.classList.add("visible");
    submitBtn.disabled = true;
    btnText.textContent = "优化中…";

    // Replace icon with spinner
    const iconEl = submitBtn.querySelector("i, .spinner");
    if (iconEl) {
        const spinner = document.createElement("span");
        spinner.className = "spinner";
        iconEl.replaceWith(spinner);
    }

    const formData = new FormData(this);

    const resp = await fetch("{% url 'submit_optimizer_task' %}", {
        method: "POST",
        body: formData
    });

    const data = await resp.json();
    const taskId = data.task_id;

    const eventSource = new EventSource(`/stream/${taskId}/`);

    function addLogItem(text, type) {
        const li = document.createElement("li");
        li.className = "log-item" + (type ? " log-" + type : "");

        const icon = document.createElement("i");
        icon.className = "log-icon";
        if (type === "done") {
            icon.setAttribute("data-lucide", "check-circle-2");
        } else if (type === "error") {
            icon.setAttribute("data-lucide", "alert-circle");
        } else {
            icon.setAttribute("data-lucide", "chevron-right");
        }

        const span = document.createElement("span");
        span.className = "log-text";
        span.textContent = text;

        li.appendChild(icon);
        li.appendChild(span);
        log.appendChild(li);

        lucide.createIcons({ nodes: [li] });
        log.scrollTop = log.scrollHeight;
    }

    eventSource.onmessage = function (event) {
        if (event.data === "[DONE]") {
            addLogItem("优化完成，正在跳转到结果页…", "done");
            eventSource.close();

            setTimeout(() => {
                window.location.href = "{% url 'result_page' %}";
            }, 800);
            return;
        }

        addLogItem(event.data);
    };

    eventSource.onerror = function () {
        addLogItem("连接中断，请检查网络后重试", "error");
        eventSource.close();
        submitBtn.disabled = false;
        btnText.textContent = "重新开始";
        const spinnerEl = submitBtn.querySelector(".spinner");
        if (spinnerEl) {
            const newIcon = document.createElement("i");
            newIcon.setAttribute("data-lucide", "rotate-ccw");
            spinnerEl.replaceWith(newIcon);
            lucide.createIcons({ nodes: [submitBtn] });
        }
    };
});
</script>

</body>
</html>
